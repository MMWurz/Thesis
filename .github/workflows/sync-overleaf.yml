name: Sync to Overleaf

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Overleaf
        env:
          OVERLEAF_URL: ${{ secrets.OVERLEAF_GIT_URL }}
          OVERLEAF_TOKEN: ${{ secrets.OVERLEAF_TOKEN }}
        run: |
          git config user.email "ci@sync"
          git config user.name "GitHub Sync"
          PROTO="${OVERLEAF_URL%%://*}"
          REST="${OVERLEAF_URL#*://}"
          git push "${PROTO}://git:${OVERLEAF_TOKEN}@${REST}" HEAD:master --force